services:
  - type: web
    runtime: docker
    name: machine-production-backend
    region: oregon
    dockerfilePath: backend/Dockerfile
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      # APP_KEY y credenciales DB ponlas en el panel de Render (sync: false si quieres que te las pida)
    preDeployCommand: |
      php artisan migrate --force
      php artisan db:seed --class=DatabaseSeeder --force || true
    healthCheckPath: /health

  - type: web
    runtime: static
    name: machine-production-frontend
    region: oregon
    rootDir: frontend
    plan: free
    buildCommand: "pnpm install && pnpm build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
